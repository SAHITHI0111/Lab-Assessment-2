<html> 

<head> 

    <title>Login Page</title> 

    <style> 

        body { 

            margin: 0; 

            height: 100vh; 

            display: flex; 

            justify-content: center; 

            align-items: center; 

            background-color: #f2f2f2; 

            font-family: Arial, sans-serif; 

        } 

  

        .login-box { 

            background-color: white; 

            padding: 30px; 

            border: 1px solid #ccc; 

            border-radius: 10px; 

            width: 300px; 

            text-align: center; 

        } 

  

        h2 { 

            margin-bottom: 20px; 

        } 

  

        input { 

            width: 100%; 

            padding: 10px; 

            margin: 10px 0; 

            border: 1px solid #ccc; 

            border-radius: 5px; 

        } 

  

        button { 

            width: 100%; 

            padding: 10px; 

            background-color: #4CAF50; 

            color: white; 

            border: none; 

            border-radius: 5px; 

            cursor: pointer; 

        } 

  

        button:hover { 

            background-color: #45a049; 

        } 

    </style> 

</head> 

<body> 

  

    <div class="login-box"> 

        <h2>Login</h2> 

        <input type="text" placeholder="Username"> 

        <input type="password" placeholder="Password"> 

        <button>Login</button> 

    </div> 

  

</body> 

</html>
